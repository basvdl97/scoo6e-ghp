<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Scoo6e official GitHub Pages site.">
  <title>Scoo6e</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f4ef;
      --text: #202124;
      --muted: #61646b;
      --accent: #0d7c66;
      --accent-strong: #0a5f4e;
      --panel: #ffffff;
      --border: #ded8ce;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151716;
        --text: #f3f1eb;
        --muted: #b9b6ad;
        --accent: #41c7a7;
        --accent-strong: #6ee0c5;
        --panel: #202321;
        --border: #363a36;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(13, 124, 102, 0.16), transparent 34rem),
        var(--bg);
    }

    main {
      width: min(100%, 960px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 48px 24px;
      display: grid;
      align-content: center;
      gap: 32px;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .mark {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: var(--accent);
      font-weight: 800;
    }

    .domain {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .hero {
      padding: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: clamp(2.5rem, 7vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      max-width: 640px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 1.125rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    .button {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      color: #ffffff;
      background: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .button.secondary {
      color: var(--accent-strong);
      background: transparent;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .status-item {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 80%, transparent);
    }

    .status-label {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    .status-value {
      display: block;
      margin-top: 6px;
      font-weight: 700;
    }

    footer {
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      main {
        padding: 28px 18px;
      }

      .site-header,
      .actions {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero {
        padding: 28px;
      }

      .status {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="site-header" aria-label="Site header">
      <a class="brand" href="/" aria-label="Scoo6e home">
        <span class="mark">S</span>
        <span>Scoo6e</span>
      </a>
      <span class="domain">scoo6e.uk</span>
    </header>

    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Scoo6e is live.</h1>
      <p>
        A clean GitHub Pages starter for Scoo6e, ready for a custom domain and future content.
      </p>
      <div class="actions" aria-label="Primary actions">
        <a class="button" href="mailto:hello@scoo6e.uk">Contact</a>
        <a class="button secondary" href="https://github.com/" rel="noopener noreferrer">GitHub</a>
      </div>
    </section>

    <section class="status" aria-label="Site status">
      <div class="status-item">
        <span class="status-label">Hosting</span>
        <span class="status-value">GitHub Pages</span>
      </div>
      <div class="status-item">
        <span class="status-label">Domain</span>
        <span class="status-value">scoo6e.uk</span>
      </div>
      <div class="status-item">
        <span class="status-label">Status</span>
        <span class="status-value">Ready</span>
      </div>
    </section>

    <footer>
      &copy; <span id="year"></span> Scoo6e. All rights reserved.
    </footer>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
